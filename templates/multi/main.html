<style>
	/* Eigenes, lokales CSS fuer die Label+Feld-Zeilen - angelehnt an das
	   lb-form-row/lb-form-label/lb-form-field-Muster aus dem offiziellen
	   LoxBerry-4-Sample-Plugin (github.com/mschlenstedt/LoxBerry-Plugin-
	   SamplePlugin-V4), aber mit eigenen Klassennamen und ohne Abhaengigkeit
	   von der Core-components.css. Die lb-* Klassen sind laut Core-CSS-Header
	   ausdruecklich noch nicht fuer Plugins freigegeben ("Plugins keep jQuery
	   Mobile") und womoeglich auf LB3 gar nicht geladen - mit einer eigenen
	   Kopie funktioniert es auf beiden Versionen gleich. */
	.cc-row {
		display: flex;
		align-items: center;
		flex-wrap: wrap;
		gap: 10px;
		margin-bottom: 6px;
	}
	.cc-row:last-child {
		margin-bottom: 0;
	}
	.cc-label {
		/* !important zur Sicherheit, falls irgendeine andere Regel width setzt. */
		flex: 0 0 190px !important;
		width: 190px !important;
		box-sizing: border-box;
		/* Rechnerisch zentriert die Flexbox Label und Feld bereits exakt (siehe
		   DevTools-Messung), der minimale Versatz kommt von der Baseline-Position
		   des Textes innerhalb von <input> vs. <label> - per Augenmass korrigiert.
		   !important noetig: jQuery Mobile setzt ".ui-mobile label, .ui-controlgroup-label"
		   mit "margin: 0 0 .4em" (Klasse+Tag = hoehere Spezifitaet als unsere reine
		   Klassenregel). Komplettes Shorthand ueberschreiben (nicht nur margin-top),
		   sonst bleibt jQMs margin-bottom:.4em stehen und macht das Label insgesamt
		   hoeher als das Eingabefeld - dann kippt die Zentrierung erst recht. */
		margin: 6px 0 0 0 !important;
	}
	.cc-field {
		display: flex;
		align-items: center;
		gap: 10px;
	}

	/* Einheitliche Schriftart fuer den gesamten Plugin-Bereich (Intro-Box, Status,
	   Formular, Hinweistexte), unabhaengig davon, was die umgebende LoxBerry-Version
	   auf body/Vorfahren-Ebene vorgibt - vermeidet einen Stilbruch zwischen z.B. der
	   kursiven Intro-Box und dem Rest, wenn LB3 und LB4 hier unterschiedliche
	   Standardschriften mitbringen. Gaengiger System-Sans-Serif-Stack statt einer
	   externen Schriftart, damit nichts nachgeladen werden muss. */
	.cc-plugin {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
		/* Der LoxBerry-Inhaltsbereich ist voll bildschirmbreit. Ohne Begrenzung
		   ziehen sich die gerahmten Bloecke auf einem Desktop ueber die gesamte
		   Breite, wodurch der Hilfetext meterweit von den Feldern entfernt steht,
		   auf die er sich bezieht. Zentriert und begrenzt bleiben Rahmen und
		   Zuordnung lesbar; auf schmalen Geraeten greift die Begrenzung nicht. */
		max-width: 1150px;
		margin: 0 auto;
	}

	/* Ersetzt die alte, kursive Intro-Box (Klartext-<i>-Tag + Inline-Styles) durch
	   eine ruhigere, mit dem Rest der Seite einheitliche Optik. Bewusst schmal
	   gehalten (Padding/Margin), damit Formular und Buttons ohne Scrollen auf den
	   Schirm passen - der Text ist eine einmalige Erklaerung, kein Arbeitsbereich. */
	.cc-intro {
		background-color: #fdf8e3;
		border-radius: 8px;
		border: 1px solid #e6dba0;
		padding: 8px 14px;
		display: table;
		margin: 10px auto;
		font-size: 0.9em;
		color: #4a4a4a;
	}

	/* Ersetzt die <font size="-1">-Hinweistexte neben den Eingabefeldern - gleiche
	   Familie wie der Rest (.cc-plugin), nur etwas kleiner/gedaempft. */
	.cc-hint-text {
		font-size: 0.85em;
		color: #666;
	}

	/* Gerahmte Themenbloecke. Ersetzen die frueheren Tabellenzeilen samt separater
	   Label-Spalte: die Gruppenueberschrift steht jetzt im Block selbst, wodurch die
	   20%-Spalte links komplett entfaellt und der Block deutlich flacher wird.

	   Bewusst <div> und NICHT <fieldset>/<legend>, obwohl letzteres die semantisch
	   schoenere Gruppierung waere: jQuery Mobile und das LoxBerry-Core-CSS setzen
	   fieldset per Tag-Selektor auf "border:0; padding:0; margin:0" zurueck. Das
	   schlaegt eine reine Klassenregel und haette den Rahmen komplett verschluckt -
	   in der Praxis genau so passiert (Gruppen ohne Rahmen, Zeilen ineinander
	   laufend, weil auch das Padding weg war). Mit div gibt es diesen Reset nicht.
	   Die !important bleiben als Absicherung gegen weitere Tag-Selektoren aus dem
	   umgebenden Theme - dieselbe Ueberlegung wie bei .cc-label oben. */
	.cc-group {
		display: block;
		border: 1px solid #d5d5d5 !important;
		border-radius: 8px !important;
		padding: 10px 16px 12px 16px !important;
		margin: 0 0 12px 0 !important;
	}
	.cc-group-title {
		font-weight: bold;
		font-size: 0.95em;
		color: #333;
		margin: 0 0 8px 0 !important;
		padding: 0;
	}
	/* Felder links, Hilfetext rechts daneben - vorher lag der Hilfetext in einer
	   eigenen Tabellenspalte. flex-wrap sorgt dafuer, dass er auf schmalen Schirmen
	   (Handy/Tablet) unter die Felder rutscht statt sie zu quetschen. */
	.cc-group-body {
		display: flex;
		flex-wrap: wrap;
		gap: 16px;
		align-items: flex-start;
	}
	.cc-group-fields {
		flex: 1 1 420px;
		min-width: 300px;
	}
	.cc-group-help {
		flex: 1 1 260px;
		min-width: 220px;
		max-width: 420px;
	}

	/* Zeilen, die von einer uebergeordneten Checkbox abhaengen (siehe
	   update_sensorwatch_fields unten). Das disabled-Attribut alleine graut zwar das
	   Eingabefeld aus, nicht aber dessen Label - ohne diese Regel sieht die Zeile
	   halb aktiv aus. Rein optisch: die eigentliche Sperre macht das disabled-Attribut,
	   nicht diese Klasse. */
	.cc-dependent.cc-disabled label,
	.cc-dependent.cc-disabled input {
		opacity: 0.45;
	}

	/* Buttonleiste - eigener kleiner Abstand statt des frueheren <p>, dessen
	   Default-Margins zusaetzliche Hoehe gekostet haben. */
	.cc-buttons {
		text-align: center;
		margin: 4px 0 10px 0;
	}

	/* Statusbox: eigene Klassen statt der LoxBerry-Systemklasse "hint" (die ist nur
	   kleiner grauer Hinweistext, keine Farbe). Jeder Zustand bekommt zusaetzlich ein
	   Symbol vorangestellt, damit der Status auch ohne genaues Lesen auf den ersten
	   Blick erkennbar ist. */
	#statusbox {
		border-radius: 8px;
		border: 1px solid;
		padding: 8px 16px;
		display: table;
		margin: 0 auto 12px auto;
		font-size: 1em;
	}
	#statusbox .cc-status-icon {
		display: inline-block;
		margin-right: 8px;
		font-weight: bold;
	}
	.cc-status-ok {
		background: #eaf6e6;
		border-color: #7ac142 !important;
	}
	.cc-status-ok .cc-status-icon {
		color: #3c8c1f;
	}
	.cc-status-warn {
		background: #fff3cd;
		border-color: #d4a017 !important;
	}
	.cc-status-warn .cc-status-icon {
		color: #a67c00;
	}
	.cc-status-error {
		background: #fbe3e3;
		border-color: #c0392b !important;
	}
	.cc-status-error .cc-status-icon {
		color: #c0392b;
	}
</style>

<div class="cc-plugin">

<center>
	<div class="cc-intro">
		<TMPL_VAR NAME=T::MENU.BESCHREIBUNG>
	</div>
</center>

<center>
	<div id="statusbox" class="<TMPL_VAR NAME=STATUSCLASS>">
		<span class="cc-status-icon">&#9679;</span><b><TMPL_VAR NAME=T::FORMTABLE.STATUS_LABEL></b> <span id="statustext"><TMPL_VAR NAME=STATUSTEXT></span>
	</div>
</center>

<form method="post" data-ajax="false" name="main_form" id="main_form" action="./index.cgi">
	<input type="hidden" name="saveformdata" value="1">

	<div class="cc-group">
		<div class="cc-group-title"><TMPL_VAR NAME=T::FORMTABLE.ZEHNDER_KONFIG></div>
		<div class="cc-group-body">
			<div class="cc-group-fields">
				<div class="cc-row">
					<label class="cc-label" id="labeliplanc" for="iplanc"><TMPL_VAR NAME=T::FORMTABLE.IPLANC></label>
					<div class="cc-field">
						<input id="iplanc" data-role="none" onChange="disable_rescan()" name="iplanc" type="text" minlength="7" maxlength="15" size="15" pattern="^((\d{1,2}|1\d\d|2[0-4]\d|25[0-5])\.){3}(\d{1,2}|1\d\d|2[0-4]\d|25[0-5])$" value="<TMPL_VAR NAME=IPLANC>">
						<a id="btnrescan" data-icon="refresh" data-role="button" data-mini="true" data-inline="true" href="./index.cgi?rescan=1"><TMPL_VAR NAME=T::BUTTON.RESCAN></a>
					</div>
				</div>
				<div class="cc-row">
					<label class="cc-label" id="labelpin" for="pin"><TMPL_VAR NAME=T::FORMTABLE.PIN></label>
					<div class="cc-field">
						<input id="pin" name="pin" type="text" class="textfield" data-role="none" style="width:80px !important;" value="<TMPL_VAR NAME=PIN>"
							data-validation="number"
							data-validation-allowing="range[0000;9999]"
							data-validation-error-msg="PIN: Bitte einen gültigen PIN zwischen 0000 and 9999 eingeben.">
					</div>
				</div>
			</div>
			<div class="cc-group-help">
				<span class="cc-hint-text"><TMPL_VAR NAME=T::FORMTABLE.ZEHNDER_HELP2></span>
			</div>
		</div>
	</div>

	<div class="cc-group">
		<div class="cc-group-title"><TMPL_VAR NAME=T::FORMTABLE.SENSORWATCH_LABEL></div>
		<div class="cc-group-body">
			<div class="cc-group-fields">
				<div class="cc-row">
					<label class="cc-label" id="labelsensorwatchenabled" for="sensorwatch_enabled"><TMPL_VAR NAME=T::FORMTABLE.SENSORWATCH_ENABLED></label>
					<div class="cc-field">
						<input id="sensorwatch_enabled" name="sensorwatch_enabled" type="checkbox" value="1" data-role="none" style="margin:0;" onChange="update_sensorwatch_fields()" <TMPL_VAR NAME=SENSORWATCH_ENABLED_CHECKED>>
					</div>
				</div>
				<!-- Die beiden folgenden Zeilen haengen an der Checkbox oben - sie werden per
				     JS (update_sensorwatch_fields) aktiviert/deaktiviert und optisch
				     ausgegraut, damit sofort sichtbar ist dass sie ohne aktivierte
				     Ueberwachung keine Wirkung haben. -->
				<div class="cc-row cc-dependent" id="row_sensorwatch_timeout">
					<label class="cc-label" id="labelsensorwatchtimeout" for="sensorwatch_timeout"><TMPL_VAR NAME=T::FORMTABLE.SENSORWATCH_TIMEOUT></label>
					<div class="cc-field">
						<input id="sensorwatch_timeout" name="sensorwatch_timeout" type="number" data-role="none" min="10" max="3600" style="width:80px !important;" value="<TMPL_VAR NAME=SENSORWATCH_TIMEOUT>">
					</div>
				</div>
				<div class="cc-row cc-dependent" id="row_sensorwatch_restart">
					<label class="cc-label" id="labelsensorwatchrestart" for="sensorwatch_restart"><TMPL_VAR NAME=T::FORMTABLE.SENSORWATCH_RESTART></label>
					<div class="cc-field">
						<input id="sensorwatch_restart" name="sensorwatch_restart" type="checkbox" value="1" data-role="none" style="margin:0;" <TMPL_VAR NAME=SENSORWATCH_RESTART_CHECKED>>
					</div>
				</div>
			</div>
			<div class="cc-group-help">
				<span class="cc-hint-text"><TMPL_VAR NAME=T::FORMTABLE.SENSORWATCH_HELP></span>
			</div>
		</div>
	</div>

	<div class="cc-group">
		<div class="cc-group-title">MQTT</div>
		<p class="<TMPL_VAR NAME=mqtthintclass>" style="margin:0;"><TMPL_VAR NAME=mqtthint></p>
	</div>

	<div id="form-error-message" class="form-error-message"></div>

	<div class="cc-buttons">
		<a id="btncancel" data-role="button" data-inline="true" data-mini="true" data-icon="delete"
			href="/admin/index.cgi"><TMPL_VAR NAME=T::BUTTON.CANCEL>
		</a>
		<button type="submit" form="main_form" id="btnsubmit" data-role="button" data-inline="true"
			data-mini="true" data-icon="check"><TMPL_VAR NAME=T::BUTTON.SAVE>
		</button>
	</div>
</form>

</div><!-- /cc-plugin -->

<script>
	// Error messages
	var $messages = $('#form-error-message');
	$.validate({
		modules : 'security',
		scrollToTopOnError : true,
		errorMessagePosition : $messages,
	});
	<!-- Button Rescan deaktivieren, falls keine IP und PIN eingegeben wurde. -->
	disable_rescan();

	function disable_rescan() {
		if ( $( "#iplanc" ).val() != "" ) {
				$( "#btnrescan" ).addClass('ui-disabled');
		}
		if ( $( "#iplanc" ).val() == "" ) {
			$( "#btnrescan" ).removeClass('ui-disabled');
		}
	}

	<!-- Zeitfeld und Neustart-Checkbox haengen an der Ueberwachungs-Checkbox: ohne -->
	<!-- aktivierte Ueberwachung wird gar nichts ausgewertet, also waeren beide -->
	<!-- wirkungslos. disabled statt nur ausgrauen, damit sie sich auch wirklich -->
	<!-- nicht bedienen lassen (und der Browser sie nicht mitsendet - index.cgi -->
	<!-- behaelt die gespeicherten Werte in dem Fall bei, siehe dort). -->
	function update_sensorwatch_fields() {
		var on = $( "#sensorwatch_enabled" ).is( ":checked" );
		$( "#sensorwatch_timeout, #sensorwatch_restart" ).prop( "disabled", !on );
		$( "#row_sensorwatch_timeout, #row_sensorwatch_restart" ).toggleClass( "cc-disabled", !on );
	}
	update_sensorwatch_fields();

	<!-- Statusanzeige periodisch per AJAX aktualisieren, ohne die Seite neu zu -->
	<!-- laden - ein voller Reload wuerde z.B. gerade eingetippte, noch nicht -->
	<!-- gespeicherte Formulardaten verwerfen. 1s Poll, passend zum 1s- -->
	<!-- Schreibintervall von cfc.py: damit tickt insbesondere die Altersanzeige -->
	<!-- der letzten Sensordaten sichtbar mit, statt in 2s-Spruengen zu springen. -->
	<!-- Laeuft nur, solange diese Seite im Browser offen ist - schliesst man den -->
	<!-- Tab, hoert das Polling sofort auf und es entsteht keinerlei Last mehr. -->
	<!-- Der Endpoint in index.cgi ist dafuer bewusst schlank gehalten (siehe dort). -->
	<!-- Echtes "sofort bei Aenderung" (Push per WebSocket/SSE) passt nicht zum -->
	<!-- zustandslosen CGI-Modell von LoxBerry, das ist der naechstbeste Kompromiss. -->
	function refreshStatus() {
		$.getJSON( './index.cgi?ajax_status=1', function( data ) {
			$( "#statustext" ).text( data.statustext );
			$( "#statusbox" ).removeClass( "cc-status-ok cc-status-warn cc-status-error" ).addClass( data.statusclass );
		} );
	}
	setInterval( refreshStatus, 1000 );
</script>
